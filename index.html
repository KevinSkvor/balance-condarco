<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balance Condarco — Ingresar</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-page">
    <div class="login-card">
        <h1 class="login-title">Balance Condarco</h1>
        <p class="login-subtitle">Ingresá con tu cuenta</p>
        <div class="error-msg" id="error-msg"></div>
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="nombre@ejemplo.com" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.5rem" id="btn-login">
                Ingresar
            </button>
        </form>
    </div>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js?v=3"></script>
<script>
(async () => {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) window.location.href = 'dashboard.html';
})();

document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById('error-msg');
    const btn     = document.getElementById('btn-login');
    errorEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Ingresando...';

    const { error } = await supabase.auth.signInWithPassword({
        email:    document.getElementById('email').value.trim(),
        password: document.getElementById('password').value
    });

    if (error) {
        errorEl.textContent = 'Email o contraseña incorrectos.';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Ingresar';
    } else {
        window.location.href = 'dashboard.html';
    }
});
</script>
</body>
</html>
